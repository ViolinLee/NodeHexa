<!DOCTYPE HTML>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    .title {
      text-align: center;
      position: relative;
    }
    .lang-switch, .wifi-btn, .settings-btn, .planner-btn {
      background-color: #1E90FF;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px #999;
      transition: all 0.3s;
    }
    .header-actions-left {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .header-actions-right {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .planner-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .lang-switch:hover, .wifi-btn:hover, .settings-btn:hover {
      background-color: #0b7dda;
    }
    .planner-btn:hover { background-color: #0b7dda; }
    .lang-switch:active, .wifi-btn:active, .settings-btn:active {
      box-shadow: 0 2px #666;
      transform: translateY(-48%);
    }
    .planner-btn:active {
      box-shadow: 0 2px #666;
      transform: translateY(-48%);
    }
    .button { 
      display: inline-block;
      width: 130px; /* 所有按钮的统一宽度 */
      height: 50px; /* 所有按钮的统一高度 */
      line-height: 50px; /* 使文本垂直居中 */
      font-size: 20px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      outline: none;
      color: #fff;
      background-color: #1E90FF;
      border: none;
      border-radius: 10px;
      box-shadow: 0 9px #999;
    }
    .button:hover {background-color: #0b7dda}
    .button:active {
      background-color: #0b7dda;
      box-shadow: 0 5px #666;
      transform: translateY(4px);
    }

    /* 移动按钮的颜色设置 */
    .button-move {
      background-color: #FF1493; /* 洋红色 */
    }
    .button-move:hover {background-color: #FF69B4}
    .button-move:active {
      background-color: #FF69B4;
      box-shadow: 0 5px #666;
      transform: translateY(4px);
    }

    /* 姿态按钮的颜色设置 */
    .button-posture {
      background-color: #FFA500; /* 科技氛围的橙色 */
    }
    .button-posture:hover {background-color: #FFB347}
    .button-posture:active {
      background-color: #FFB347;
      box-shadow: 0 5px #666;
      transform: translateY(4px);
    }

    /* 待机模式的颜色设置 */
    .button-standby {
      background-color: #3A3A3A; /* 大疆无人机灰 */
    }
    .button-standby:hover {background-color: #4A4A4A}
    .button-standby:active {
      background-color: #4A4A4A;
      box-shadow: 0 5px #666;
      transform: translateY(4px);
    }

    .button-performance {
      background-color: #6A5ACD;
    }
    .button-performance:hover {background-color: #7B68EE}
    .button-performance:active {
      background-color: #7B68EE;
      box-shadow: 0 5px #666;
      transform: translateY(4px);
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
      align-items: center;
      margin-top: 20px;
    }
    .grid-item-1 { grid-column: span 1; }
    .grid-item-2 { grid-column: span 2; }
    .grid-item-3 { grid-column: span 3; }
    .empty { visibility: hidden; }
    .empty-row { grid-column: span 3; height: 20px; }
    .performance-section {
      display: none;
      margin-top: 10px;
    }

    /* 速度控制区域样式 */
    .speed-control {
      max-width: 500px;
      margin: 10px auto;
      padding: 10px;
      background-color: #f5f5f5;
      border-radius: 15px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .speed-label {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }
    /* 速度档位按钮样式 */
    .speed-levels {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .speed-btn {
      padding: 10px 20px;
      border: 2px solid #1E90FF;
      background-color: white;
      color: #1E90FF;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s ease;
      min-width: 80px;
    }
    .speed-btn:hover {
      background-color: #1E90FF;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(30, 144, 255, 0.3);
    }
    .speed-btn.active {
      background-color: #1E90FF;
      color: white;
      box-shadow: 0 2px 4px rgba(30, 144, 255, 0.3);
    }
    .speed-btn.active:hover {
      background-color: #0b7dda;
    }

    /* 步态控制区域样式（单按钮：点击循环切换） */
    .gait-control {
      max-width: 500px;
      margin: 10px auto;
      padding: 10px;
      background-color: #f5f5f5;
      border-radius: 15px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: block;
    }
    .gait-label {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }
    /* 四足步态：radio 横向布局 */
    .gait-options {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .gait-radio {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 2px solid #28a745;
      background: #fff;
      color: #1f7a34;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .gait-radio input {
      accent-color: #28a745;
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .gait-radio.active {
      background: #28a745;
      color: #fff;
    }

    /* 试验性开关（仅四足显示） */
    .gait-experimental-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      margin-bottom: 6px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #bbb;
      transition: .2s;
      border-radius: 999px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    .switch input:checked + .slider {
      background-color: #1E90FF;
    }
    .switch input:checked + .slider:before {
      transform: translateX(24px);
    }
    .gait-experimental-text {
      font-size: 14px;
      color: #333;
      font-weight: bold;
    }

    /* 页脚署名样式 */
    .footer {
      margin-top: 40px;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      border-radius: 10px 10px 0 0;
      box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.1);
    }
    .footer-content {
      max-width: 800px;
      margin: 0 auto;
    }
    .footer-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: nowrap;
      margin-top: 12px;
    }
    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 15px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      transition: all 0.3s;
    }
    .footer-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .footer-icon {
      width: 20px;
      height: 20px;
    }

    /* 模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 5% auto;
      padding: 20px;
      border: 1px solid #888;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #1E90FF;
    }
    .modal-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }
    .close {
      color: #aaa;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      line-height: 20px;
    }
    .close:hover {
      color: #000;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }
    .form-input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: #1E90FF;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-primary {
      flex: 1;
      padding: 10px;
      background-color: #1E90FF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
    .btn-primary:hover {
      background-color: #0b7dda;
    }
    .btn-secondary {
      flex: 1;
      padding: 10px;
      background-color: #666;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-secondary:hover {
      background-color: #555;
    }
    .btn-danger {
      padding: 10px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
      width: 100%;
    }
    .btn-danger:hover {
      background-color: #c82333;
    }
    .info-box {
      background-color: #e7f3ff;
      border-left: 4px solid #1E90FF;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      font-size: 14px;
    }
    .wifi-qr {
      text-align: center;
      margin: 15px 0;
      padding: 10px;
      background-color: #f5f5f5;
      border-radius: 5px;
    }
    .wifi-qr-text {
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      margin-top: 10px;
    }
    .status-message {
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      display: none;
    }
    .status-success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <h1 class="title">
    <div class="header-actions-left">
      <button class="wifi-btn" onclick="openWifiSettings()" data-zh="📶 WiFi" data-en="📶 WiFi">📶 WiFi</button>
      <button class="settings-btn" onclick="openOtherSettings()" data-zh="⚙️ 设置" data-en="⚙️ Settings">⚙️ 设置</button>
      <button class="planner-btn" id="plannerBtn" onclick="openPlanner()" title="运动规划" aria-label="运动规划" data-zh="🧭 规划" data-en="🧭 Planner">🧭 规划</button>
    </div>
    <span id="pageTitle">机器人控制</span>
    <div class="header-actions-right">
      <button class="lang-switch" onclick="toggleLanguage()">English</button>
    </div>
  </h1>
  <div id="powerBadgeMount"></div>

  <center><span align="center" style="text-align: center; display: inline-block;padding: 5px; font-size: 120%;font-weight: bold;"><a style="width:200px; height:50px;" href="/calibration">
    <button id="CALIBRATEPAGE" type="button" onclick="buttonclick(this);" style="width:200px; height: 30px; Text-align: center;" data-zh="校准：开始 | 保存" data-en="Calibration: Start | Save">校准：开始 | 保存</button></a></span></center><br>

  <!-- 速度控制区域 -->
  <div class="speed-control">
    <div class="speed-label">运动速度控制</div>
    <div class="speed-levels">
      <button class="speed-btn" data-speed="0.25" data-zh="极慢" data-en="Slowest">极慢</button>
      <button class="speed-btn" data-speed="0.33" data-zh="慢速" data-en="Slow">慢速</button>
      <button class="speed-btn active" data-speed="0.5" data-zh="中速" data-en="Medium">中速</button>
      <button class="speed-btn" data-speed="1.0" data-zh="快速" data-en="Fastest">快速</button>
    </div>
  </div>

  <!-- 步态控制区域（单按钮交互：点击循环切换；六足固定默认步态） -->
  <div class="gait-control" id="gaitControl">
    <div class="gait-label" id="gaitLabel">步态模式</div>
    <!-- 仅四足显示：试验性开关 -->
    <div class="gait-experimental-row" id="gaitExperimentalRow" style="display:none;">
      <label class="switch" title="Experimental gaits">
        <input type="checkbox" id="gaitExperimentalToggle">
        <span class="slider"></span>
      </label>
      <span class="gait-experimental-text" id="gaitExperimentalText" data-zh="试验性" data-en="Experimental">试验性</span>
    </div>
    <!-- 仅四足显示：radio button 选择 -->
    <div class="gait-options" id="gaitOptions"></div>
  </div>
  
  <div class="grid-container">
    <button class="button button-posture grid-item-1" onclick="sendCommand(9)" data-zh="旋转X" data-en="RotateX">旋转X</button>
    <button class="button button-posture grid-item-1" onclick="sendCommand(10)" data-zh="旋转Y" data-en="RotateY">旋转Y</button>
    <button class="button button-posture grid-item-1" onclick="sendCommand(11)" data-zh="旋转Z" data-en="RotateZ">旋转Z</button>
    <button class="button button-posture grid-item-3" onclick="sendCommand(12)" data-zh="扭腰" data-en="Twist">扭腰</button>
    
    <div class="empty-row"></div>
    
    <button class="button grid-item-1" onclick="sendCommand(4)" data-zh="左转" data-en="TurnLeft">左转</button>
    <div class="empty grid-item-1"></div>
    <button class="button grid-item-1" onclick="sendCommand(5)" data-zh="右转" data-en="TurnRight">右转</button>
    
    <button class="button grid-item-1" onclick="sendCommand(2)" data-zh="快跑" data-en="Run">快跑</button>
    <button class="button button-move grid-item-1" onclick="sendCommand(1)" data-zh="前进" data-en="Forward">前进</button>
    <button class="button grid-item-1" onclick="sendCommand(8)" data-zh="爬行" data-en="Climb">爬行</button>
    
    <button class="button button-move grid-item-1" onclick="sendCommand(6)" data-zh="左移" data-en="ShiftLeft">左移</button>
    <button class="button button-standby grid-item-1" onclick="sendCommand(0)" data-zh="待机" data-en="Standby">待机</button>
    <button class="button button-move grid-item-1" onclick="sendCommand(7)" data-zh="右移" data-en="ShiftRight">右移</button>
    <button class="button button-move grid-item-3" onclick="sendCommand(3)" data-zh="后退" data-en="Backward">后退</button>
  </div>

  <div class="performance-section" id="performancePanel">
    <div class="grid-container">
      <button class="button button-performance grid-item-1" id="performanceFreestyleBtn" onclick="sendPerformanceCommand('freestyle')" data-zh="自由律动" data-en="Freestyle">自由律动</button>
      <button class="button button-performance grid-item-1" id="performanceBeatSwayBtn" onclick="sendPerformanceCommand('beatsway')" data-zh="节拍摇摆" data-en="Beat Sway">节拍摇摆</button>
      <button class="button button-performance grid-item-1" id="performanceShowtimeBtn" onclick="sendPerformanceCommand('showtime')" data-zh="登场秀" data-en="Showtime">登场秀</button>
    </div>
  </div>

  <!-- AP配置模态框 -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">WiFi AP 配置</span>
        <span class="close" onclick="closeWifiSettings()">&times;</span>
      </div>
      <div id="settingsForm">
        <div class="form-group">
          <label class="form-label" id="labelSSID">AP 名称 (SSID)</label>
          <input type="text" id="apSSID" class="form-input" placeholder="NodeHexa-XXXX" maxlength="31">
        </div>
        <div class="form-group">
          <label class="form-label" id="labelPassword">密码 (8-63字符，留空为开放网络)</label>
          <input type="password" id="apPassword" class="form-input" placeholder="留空为开放网络" maxlength="63">
        </div>
        <div class="info-box" id="currentInfo">
          <strong>当前配置：</strong><br>
          <span id="currentSSID">加载中...</span>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveAPConfig()" id="btnSave">保存</button>
          <button class="btn-secondary" onclick="closeWifiSettings()" id="btnCancel">取消</button>
        </div>
        <button class="btn-danger" onclick="resetAPConfig()" id="btnReset">恢复默认配置</button>
        <div class="status-message" id="statusMessage"></div>
      </div>
      <div id="pendingInfo" style="display: none;">
        <div class="info-box">
          <strong>配置已更新！</strong><br>
          <p id="pendingMessage">设备将在3秒后重启，请连接到新的AP：</p>
          <div class="wifi-qr">
            <div><strong id="newSSID">-</strong></div>
            <div id="newPassword" style="margin-top: 5px;"></div>
            <div class="wifi-qr-text" id="wifiQRText"></div>
          </div>
          <p style="font-size: 12px; color: #666; margin-top: 10px;">
            连接后访问 http://192.168.4.1 完成确认
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- 其他设置模态框（预留未来扩展项） -->
  <div id="otherSettingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="otherModalTitle">设置</span>
        <span class="close" onclick="closeOtherSettings()">&times;</span>
      </div>
      <div id="otherSettingsForm">
        <div class="form-group">
          <label class="form-label" id="labelLowBatteryProtect">低电量保护</label>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div style="font-size:13px; color:#666;" id="hintLowBatteryProtect">默认开启；关闭后低电量状态也允许运行（有风险、不建议！）</div>
            <label class="switch" title="Low battery protection">
              <input type="checkbox" id="lowBatteryProtectToggle">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" id="labelMotionButtonMode">动作按钮模式</label>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div style="font-size:13px; color:#666;">
              <div id="hintMotionButtonMode">持续：持续生效；单次：只执行 1 个动作周期。</div>
              <div id="motionButtonModeState" style="margin-top:4px; font-weight:600; color:#333;">当前：持续</div>
            </div>
            <label class="switch" title="Motion button mode">
              <input type="checkbox" id="motionButtonModeToggle">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div class="status-message" id="otherStatusMessage"></div>
      </div>
    </div>
  </div>

  <!-- 页脚署名 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-title" id="footerTitle">开源项目 · NodeHexa 机器人</div>
      <div class="footer-links">
        <a href="https://space.bilibili.com/85652131" target="_blank" class="footer-link" title="B站主页">
          <svg class="footer-icon" viewBox="0 0 24 24" fill="currentColor">

  <script src="/power_ui.js"></script>
  <script>
    var webSocketCarInputUrl = "ws:\/\/" + window.location.hostname + "/cmd"; 
    let websocketCarInput;
    let powerUi;
    let lowBatteryProtectionEnabled = true;
    let motionButtonMode = 'continuous';
    let performanceCaps = {
      freestyle: false,
      beatsway: false,
      showtime: false
    };
    const commandModeToName = {
      0: 'standby',
      1: 'forward',
      2: 'forwardfast',
      3: 'backward',
      4: 'turnleft',
      5: 'turnright',
      6: 'shiftleft',
      7: 'shiftright',
      8: 'climb',
      9: 'rotatex',
      10: 'rotatey',
      11: 'rotatez',
      12: 'twist',
      13: 'beatsway'
    };

    function guardLowBattery() {
      return powerUi ? powerUi.guardLowBattery() : false;
    }

    function initRobotInputWebSocket() {
      websocketCarInput = new WebSocket(webSocketCarInputUrl);
      websocketCarInput.onopen = function(event) {
        console.log('WebSocket is open now.');
        loadCapsAndUpdateFooter().catch(function() {});
      };
      websocketCarInput.onclose = function(event) {
        console.log('WebSocket is closed now. Reconnecting...');
        setTimeout(initRobotInputWebSocket, 2000);
      };
      websocketCarInput.onmessage = function(event) {
        try {
          const msg = JSON.parse(event.data);
          if (powerUi && powerUi.handleWsMessage(msg)) {
            lowBatteryProtectionEnabled = !!powerUi.getState().lowBatteryProtectionEnabled;
            return;
          }
        } catch (_) {
          // ignore non-JSON payload
        }
      };
    }

    function sendWsPayload(payload) {
      if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
        websocketCarInput.send(JSON.stringify(payload));
        console.log('Sent payload:', payload);
      } else {
        console.log('WebSocket is not open. Cannot send payload.');
      }
    }

    function sendLegacyMovementCommand(commandMode) {
      let command = 0;
      command |= (1<<commandMode);
      sendWsPayload({movementMode: command});
    }

    function sendStopCommand() {
      sendWsPayload({stop: true});
    }

    function sendSingleCycleCommand(commandMode) {
      const movementName = commandModeToName[commandMode];
      if (!movementName || movementName === 'standby') {
        sendStopCommand();
        return;
      }
      sendWsPayload({mode: movementName, cycles: 1});
    }

    function sendPerformanceCommand(kind) {
      if (guardLowBattery()) return;
      sendWsPayload({
        performance: kind,
        repeat: motionButtonMode !== 'single_cycle'
      });
    }

    function sendCommand(commandMode) {
      if (guardLowBattery()) return;
      if (commandMode === 0) {
        sendStopCommand();
        return;
      }
      if (motionButtonMode === 'single_cycle') {
        sendSingleCycleCommand(commandMode);
      } else {
        sendLegacyMovementCommand(commandMode);
      }
    }

    function sendSpeed(speed) {
      if (guardLowBattery()) return;
      if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
        websocketCarInput.send(JSON.stringify({speed: parseFloat(speed)}));
        console.log('Sent speed: ' + speed);
      } else {
        console.log('WebSocket is not open. Cannot send speed.');
      }
    }

    function sendGaitMode(gaitMode) {
      if (guardLowBattery()) return;
      if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
        websocketCarInput.send(JSON.stringify({gaitMode: parseInt(gaitMode, 10)}));
        console.log('Sent gaitMode: ' + gaitMode);
      } else {
        console.log('WebSocket is not open. Cannot send gaitMode.');
      }
    }

    // 步态控制（仅四足需要；六足不显示）
    let robotType = 'hexa';
    let currentGait = 3; // 四足默认匍匐(Creep)
    let experimentalGaitsEnabled = false; // 默认不打开试验性
    let hasSavedGaitMode = false; // 是否存在本地保存的 gait 偏好
    const gaitNames = {
      0: { zh: '小跑', en: 'Trot' },
      1: { zh: '慢走', en: 'Walk' },
      2: { zh: '疾驰', en: 'Gallop' },
      3: { zh: '匍匐', en: 'Creep' }
    };

    const GAITS_STABLE = [3, 1];      // 默认仅开放：Creep + Walk
    const GAITS_ALL = [3, 1, 0, 2];   // 打开试验性：Creep, Walk, Trot, Gallop（按体验排序）

    function getSupportedGaitsForQuad() {
      return experimentalGaitsEnabled ? GAITS_ALL : GAITS_STABLE;
    }

    function normalizeCurrentGaitForQuad() {
      const supported = getSupportedGaitsForQuad();
      if (!supported.includes(currentGait)) {
        currentGait = 3; // 回退到 creep
      }
    }

    function syncGaitModeToRobotIfReady() {
      if (robotType !== 'quad') return;
      normalizeCurrentGaitForQuad();

      // 写回本地缓存，保证 UI/存储一致
      try {
        window.localStorage.setItem('gaitMode', String(currentGait));
      } catch (_) {
        // ignore
      }

      // 下发步态：固件约束仅允许在待机模式切换
      if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
        sendCommand(0);
        setTimeout(() => sendGaitMode(currentGait), 180);
      }
    }

    function renderGaitRadios() {
      const optionsEl = document.getElementById('gaitOptions');
      if (!optionsEl) return;
      optionsEl.innerHTML = '';

      if (robotType !== 'quad') return; // 六足不渲染

      const before = currentGait;
      normalizeCurrentGaitForQuad();
      // 若当前步态因“关闭试验性”等原因变为不支持，则回退后需要同步给机器人
      if (before !== currentGait) {
        syncGaitModeToRobotIfReady();
      }

      const supported = getSupportedGaitsForQuad();
      supported.forEach((g) => {
        const label = document.createElement('label');
        label.className = 'gait-radio' + (g === currentGait ? ' active' : '');
        label.setAttribute('data-gait', String(g));

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = 'gaitMode';
        input.value = String(g);
        input.checked = (g === currentGait);

        const span = document.createElement('span');
        span.textContent = gaitNames[g] ? gaitNames[g][currentLang] : String(g);

        label.appendChild(input);
        label.appendChild(span);
        optionsEl.appendChild(label);

        input.addEventListener('change', () => {
          if (!input.checked) return;

          // 约束：固件侧仅允许在待机模式切换步态
          // 体验优化：先下发待机，再下发 gaitMode
          sendCommand(0);
          currentGait = g;

          try {
            window.localStorage.setItem('gaitMode', String(currentGait));
          } catch (_) {
            // ignore
          }

          // 更新 active 样式
          const all = optionsEl.querySelectorAll('.gait-radio');
          all.forEach((el) => el.classList.remove('active'));
          label.classList.add('active');

          setTimeout(() => sendGaitMode(currentGait), 180);
        });
      });
    }

    function renderGaitExperimentalToggle() {
      const row = document.getElementById('gaitExperimentalRow');
      const toggle = document.getElementById('gaitExperimentalToggle');
      const text = document.getElementById('gaitExperimentalText');
      if (!row || !toggle || !text) return;

      if (robotType !== 'quad') {
        row.style.display = 'none';
        return;
      }

      row.style.display = 'flex';
      toggle.checked = !!experimentalGaitsEnabled;
      text.textContent = text.getAttribute('data-' + currentLang) || text.textContent;
    }

    function updateGaitControlVisibility() {
      const container = document.getElementById('gaitControl');
      if (!container) return;
      // 六足不需要步态切换入口
      container.style.display = (robotType === 'quad') ? 'block' : 'none';
    }

    function updatePerformanceVisibility() {
      const panel = document.getElementById('performancePanel');
      if (!panel) return;

      const buttonMap = {
        freestyle: document.getElementById('performanceFreestyleBtn'),
        beatsway: document.getElementById('performanceBeatSwayBtn'),
        showtime: document.getElementById('performanceShowtimeBtn')
      };

      let hasVisibleButton = false;
      Object.keys(buttonMap).forEach((key) => {
        const button = buttonMap[key];
        if (!button) return;
        const visible = !!performanceCaps[key];
        button.style.display = visible ? '' : 'none';
        if (visible) hasVisibleButton = true;
      });

      panel.style.display = hasVisibleButton ? 'block' : 'none';
    }

    function initSpeedControl() {
      const speedButtons = document.querySelectorAll('.speed-btn');
      
      let currentSpeed = 0.5; // 默认中速
      
      // 档位按钮点击事件
      speedButtons.forEach(button => {
        button.addEventListener('click', function() {
          // 移除所有按钮的active状态
          speedButtons.forEach(btn => btn.classList.remove('active'));
          // 添加当前按钮的active状态
          this.classList.add('active');
          
          // 更新当前速度值
          currentSpeed = parseFloat(this.dataset.speed);
          
          // 发送速度命令
          sendSpeed(currentSpeed);
          
          console.log('速度已切换到: ' + this.textContent + ' (值: ' + currentSpeed + ')');
        });
      });
    }

    function initGaitControl() {
      // 恢复本地缓存（仅四足生效）
      try {
        const saved = window.localStorage.getItem('gaitMode');
        if (saved !== null && saved !== undefined && saved !== '') {
          const v = parseInt(saved, 10);
          if (!Number.isNaN(v) && v >= 0 && v <= 3) {
            currentGait = v;
            hasSavedGaitMode = true;
          }
        }
      } catch (_) {
        // ignore
      }

      try {
        const savedExp = window.localStorage.getItem('experimentalGaits');
        if (savedExp === '1' || savedExp === 'true') experimentalGaitsEnabled = true;
        if (savedExp === '0' || savedExp === 'false') experimentalGaitsEnabled = false;
      } catch (_) {
        // ignore
      }

      const toggle = document.getElementById('gaitExperimentalToggle');
      if (toggle) {
        toggle.addEventListener('change', () => {
          experimentalGaitsEnabled = !!toggle.checked;
          try {
            window.localStorage.setItem('experimentalGaits', experimentalGaitsEnabled ? '1' : '0');
          } catch (_) {
            // ignore
          }
          renderGaitExperimentalToggle();
          renderGaitRadios();
        });
      }

      // 先按默认 robotType 渲染一次（后续 loadCaps 会再次刷新）
      updateGaitControlVisibility();
      renderGaitExperimentalToggle();
      renderGaitRadios();
    }

    // 语言切换功能
    let currentLang = 'zh'; // 默认中文

    const langTexts = {
      pageTitle: { zh: '机器人控制', en: 'Robot Control' },
      langButton: { zh: 'English', en: '中文' },
      speedLabel: { zh: '运动速度控制', en: 'Movement Speed Control' },
      gaitLabel: { zh: '步态模式', en: 'Gait Mode' },
      footerTitle: { zh: '开源项目 · NodeHexa 机器人', en: 'Open Source · NodeHexa Robot' },
      bilibiliText: { zh: 'B站: 智造师_RoboticsCV', en: 'Bilibili: 智造师_RoboticsCV' },
      githubText: { zh: 'GitHub: ViolinLee', en: 'GitHub: ViolinLee' },
      wechatText: { zh: '公众号: RoboticsCV', en: 'WeChat: RoboticsCV' },
      settingsBtn: { zh: '⚙️ 设置', en: '⚙️ Settings' },
      wifiBtn: { zh: '📶 WiFi', en: '📶 WiFi' },
      modalTitle: { zh: 'WiFi AP 配置', en: 'WiFi AP Settings' },
      labelSSID: { zh: 'AP 名称 (SSID)', en: 'AP Name (SSID)' },
      labelPassword: { zh: '密码 (8-63字符，留空为开放网络)', en: 'Password (8-63 chars, empty for open network)' },
      btnSave: { zh: '保存', en: 'Save' },
      btnCancel: { zh: '取消', en: 'Cancel' },
      btnReset: { zh: '恢复默认配置', en: 'Reset to Default' },
      currentConfig: { zh: '当前配置：', en: 'Current Config: ' },
      pendingMsg: { zh: '设备将在3秒后重启，请连接到新的AP：', en: 'Device will reboot in 3 seconds, please connect to new AP:' },
      pendingHint: { zh: '连接后访问 http://192.168.4.1 完成确认', en: 'Visit http://192.168.4.1 after connecting to confirm' },
      otherModalTitle: { zh: '设置', en: 'Settings' },
      labelLowBatteryProtect: { zh: '低电量保护', en: 'Low battery protection' },
      hintLowBatteryProtect: { zh: '默认开启；关闭后低电量状态也允许运行', en: 'Enabled by default. Turn off to allow running under low battery.' },
      labelMotionButtonMode: { zh: '动作按钮模式', en: 'Motion button mode' },
      hintMotionButtonMode: { zh: '持续：普通动作持续生效，表演动作会循环播放；单次：普通动作执行 1 个动作周期，表演动作执行 1 次完整表演。', en: 'Continuous: basic motions stay active and performances loop. Single: basic motions run 1 cycle, while performances run one full show.' },
      motionButtonModeContinuous: { zh: '当前：持续', en: 'Current: Continuous' },
      motionButtonModeSingle: { zh: '当前：单次', en: 'Current: Single' }
    };

    function toggleLanguage() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      
      // 更新页面标题
      document.getElementById('pageTitle').textContent = langTexts.pageTitle[currentLang];
      
      // 更新语言切换按钮文本
      document.querySelector('.lang-switch').textContent = langTexts.langButton[currentLang];
      
      // 更新速度控制区域文本
      document.querySelector('.speed-label').textContent = langTexts.speedLabel[currentLang];

      // 更新步态控制区域文本
      const gaitLabelEl = document.getElementById('gaitLabel');
      if (gaitLabelEl) gaitLabelEl.textContent = langTexts.gaitLabel[currentLang];
      renderGaitExperimentalToggle();
      renderGaitRadios();
      
      // 更新速度档位按钮文本
      const speedButtons = document.querySelectorAll('.speed-btn[data-zh][data-en]');
      speedButtons.forEach(button => {
        button.textContent = button.getAttribute('data-' + currentLang);
      });

      // 更新所有按钮文本
      const buttons = document.querySelectorAll('.button[data-zh][data-en]');
      buttons.forEach(button => {
        button.textContent = button.getAttribute('data-' + currentLang);
      });

      // 更新校准入口按钮文本
      const calibrateBtn = document.getElementById('CALIBRATEPAGE');
      if (calibrateBtn) {
        const t = calibrateBtn.getAttribute('data-' + currentLang);
        if (t) calibrateBtn.textContent = t;
      }
      
      // 更新设置按钮文本
      const settingsBtn = document.querySelector('.settings-btn');
      if (settingsBtn) {
        settingsBtn.textContent = langTexts.settingsBtn[currentLang];
      }

      // 更新 WiFi 按钮文本
      const wifiBtn = document.querySelector('.wifi-btn');
      if (wifiBtn) {
        wifiBtn.textContent = langTexts.wifiBtn[currentLang];
      }

      // 更新“运动规划器”入口标题（图标按钮无需切换文本）
      const plannerBtn = document.getElementById('plannerBtn');
      if (plannerBtn) {
        plannerBtn.textContent = plannerBtn.getAttribute('data-' + currentLang) || plannerBtn.textContent;
        plannerBtn.title = (currentLang === 'zh') ? '运动规划' : 'Motion Planner';
        plannerBtn.setAttribute('aria-label', plannerBtn.title);
      }
      
      // 更新页脚文本
      document.getElementById('footerTitle').textContent = langTexts.footerTitle[currentLang];
      document.getElementById('bilibiliText').textContent = langTexts.bilibiliText[currentLang];
      document.getElementById('githubText').textContent = langTexts.githubText[currentLang];
      document.getElementById('wechatText').textContent = langTexts.wechatText[currentLang];
      
      // 更新模态框文本
      updateModalTexts();
      if (powerUi) powerUi.render();
      
      console.log('Language switched to: ' + (currentLang === 'zh' ? '中文' : 'English'));
    }

    function updateModalTexts() {
      document.getElementById('modalTitle').textContent = langTexts.modalTitle[currentLang];
      document.getElementById('labelSSID').textContent = langTexts.labelSSID[currentLang];
      document.getElementById('labelPassword').textContent = langTexts.labelPassword[currentLang];
      document.getElementById('btnSave').textContent = langTexts.btnSave[currentLang];
      document.getElementById('btnCancel').textContent = langTexts.btnCancel[currentLang];
      document.getElementById('btnReset').textContent = langTexts.btnReset[currentLang];
      const currentInfo = document.getElementById('currentInfo');
      if (currentInfo) {
        currentInfo.innerHTML = '<strong>' + langTexts.currentConfig[currentLang] + '</strong><br><span id="currentSSID">加载中...</span>';
      }

      // 其他设置 modal
      const otherTitle = document.getElementById('otherModalTitle');
      if (otherTitle) otherTitle.textContent = langTexts.otherModalTitle[currentLang];
      const lbLabel = document.getElementById('labelLowBatteryProtect');
      if (lbLabel) lbLabel.textContent = langTexts.labelLowBatteryProtect[currentLang];
      const lbHint = document.getElementById('hintLowBatteryProtect');
      if (lbHint) lbHint.textContent = langTexts.hintLowBatteryProtect[currentLang];
      const motionLabel = document.getElementById('labelMotionButtonMode');
      if (motionLabel) motionLabel.textContent = langTexts.labelMotionButtonMode[currentLang];
      const motionHint = document.getElementById('hintMotionButtonMode');
      if (motionHint) motionHint.textContent = langTexts.hintMotionButtonMode[currentLang];
      updateMotionButtonModeStateText();
    }

    function updateMotionButtonModeStateText() {
      const stateEl = document.getElementById('motionButtonModeState');
      if (!stateEl) return;
      stateEl.textContent = motionButtonMode === 'single_cycle'
        ? langTexts.motionButtonModeSingle[currentLang]
        : langTexts.motionButtonModeContinuous[currentLang];
    }

    function applySettingsResponse(data) {
      if (data && data.power && typeof data.power.lowBatteryProtectionEnabled !== 'undefined') {
        lowBatteryProtectionEnabled = !!data.power.lowBatteryProtectionEnabled;
        if (powerUi) powerUi.setProtectionEnabled(lowBatteryProtectionEnabled);
      }
      if (data && data.motion && typeof data.motion.buttonMode === 'string') {
        motionButtonMode = data.motion.buttonMode === 'single_cycle' ? 'single_cycle' : 'continuous';
      }

      const lbToggle = document.getElementById('lowBatteryProtectToggle');
      if (lbToggle) lbToggle.checked = !!lowBatteryProtectionEnabled;
      const motionToggle = document.getElementById('motionButtonModeToggle');
      if (motionToggle) motionToggle.checked = motionButtonMode === 'single_cycle';
      updateMotionButtonModeStateText();
    }

    function showOtherSettingsStatus(message, type) {
      const statusEl = document.getElementById('otherStatusMessage');
      if (!statusEl) return;
      statusEl.textContent = message;
      statusEl.className = 'status-message status-' + type;
      statusEl.style.display = 'block';
      if (type === 'success') {
        setTimeout(() => { statusEl.style.display = 'none'; }, 2500);
      }
    }

    async function loadCapsAndUpdateFooter() {
      try {
        const resp = await fetch('/api/caps', { cache: 'no-store' });
        const data = await resp.json();
        const type = data && data.robot && data.robot.type ? data.robot.type : 'hexa';
        robotType = type;
        performanceCaps = {
          freestyle: !!(data && data.performance && data.performance.freestyle),
          beatsway: !!(data && data.performance && data.performance.beatsway),
          showtime: !!(data && data.performance && data.performance.showtime)
        };
        if (powerUi) {
          powerUi.applyCaps(data);
          lowBatteryProtectionEnabled = !!powerUi.getState().lowBatteryProtectionEnabled;
        }

        if (type === 'quad') {
          // 四足：默认步态为 creep(3)，若本地缓存非法则回退到默认
          if (typeof currentGait !== 'number' || Number.isNaN(currentGait) || currentGait < 0 || currentGait > 3) {
            currentGait = 3;
          }
        } else {
          // 六足：不需要步态 UI
          currentGait = 0;
        }

        updateGaitControlVisibility();
        updatePerformanceVisibility();
        renderGaitExperimentalToggle();
        renderGaitRadios();
        // 进入页面时：若本地保存过步态偏好，则同步一次，避免 UI/机器人状态不一致。
        // 低电量锁存时跳过自动同步，避免初始化阶段触发重复弹窗。
        if (type === 'quad' && hasSavedGaitMode && !(powerUi && powerUi.getState().lowBatteryLatched)) {
          syncGaitModeToRobotIfReady();
        }
        if (type === 'quad') {
          langTexts.footerTitle = { zh: '开源项目 · NodeQuadMini 四足机器人', en: 'Open Source · NodeQuadMini Quadruped Robot' };
        } else {
          langTexts.footerTitle = { zh: '开源项目 · NodeHexa 六足机器人', en: 'Open Source · NodeHexa Hexapod Robot' };
        }
        document.getElementById('footerTitle').textContent = langTexts.footerTitle[currentLang];
      } catch (_) {
        updatePerformanceVisibility();
      }
    }

    // AP 配置功能
    function openWifiSettings() {
      document.getElementById('settingsModal').style.display = 'block';
      loadAPConfig();
    }

    function openPlanner() {
      window.location.href = '/planner';
    }

    function closeWifiSettings() {
      document.getElementById('settingsModal').style.display = 'none';
      document.getElementById('settingsForm').style.display = 'block';
      document.getElementById('pendingInfo').style.display = 'none';
      document.getElementById('statusMessage').style.display = 'none';
    }

    // 其他设置功能（预留扩展点）
    function openOtherSettings() {
      document.getElementById('otherSettingsModal').style.display = 'block';
      loadOtherSettings();
    }

    function closeOtherSettings() {
      document.getElementById('otherSettingsModal').style.display = 'none';
      const statusEl = document.getElementById('otherStatusMessage');
      if (statusEl) statusEl.style.display = 'none';
    }

    async function loadOtherSettings() {
      // 优先读取后端设置接口，失败则回退到 caps
      try {
        const resp = await fetch('/api/settings', { cache: 'no-store' });
        const data = await resp.json();
        if (data && data.status === 'success') {
          applySettingsResponse(data);
        }
      } catch (_) {
        // ignore
      }
      applySettingsResponse({
        power: { lowBatteryProtectionEnabled: lowBatteryProtectionEnabled },
        motion: { buttonMode: motionButtonMode }
      });
    }

    async function setLowBatteryProtectionEnabled(enabled) {
      const statusEl = document.getElementById('otherStatusMessage');
      if (statusEl) {
        statusEl.className = 'status-message';
        statusEl.style.display = 'none';
      }

      try {
        const resp = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ power: { lowBatteryProtectionEnabled: !!enabled } })
        });
        const data = await resp.json();
        if (data && data.status === 'success') {
          applySettingsResponse(data);
          if (lowBatteryProtectionEnabled) {
            await loadCapsAndUpdateFooter();
          }
          showOtherSettingsStatus((currentLang === 'zh') ? '已保存' : 'Saved', 'success');
        } else {
          throw new Error((data && data.message) ? data.message : 'Unknown error');
        }
      } catch (e) {
        showOtherSettingsStatus((currentLang === 'zh')
          ? ('保存失败: ' + (e && e.message ? e.message : '网络错误'))
          : ('Save failed: ' + (e && e.message ? e.message : 'Network error')), 'error');
      }
    }

    async function setMotionButtonMode(mode) {
      const statusEl = document.getElementById('otherStatusMessage');
      if (statusEl) {
        statusEl.className = 'status-message';
        statusEl.style.display = 'none';
      }

      try {
        const resp = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ motion: { buttonMode: mode } })
        });
        const data = await resp.json();
        if (data && data.status === 'success') {
          applySettingsResponse(data);
          showOtherSettingsStatus((currentLang === 'zh') ? '已保存' : 'Saved', 'success');
        } else {
          throw new Error((data && data.message) ? data.message : 'Unknown error');
        }
      } catch (e) {
        showOtherSettingsStatus((currentLang === 'zh')
          ? ('保存失败: ' + (e && e.message ? e.message : '网络错误'))
          : ('Save failed: ' + (e && e.message ? e.message : 'Network error')), 'error');
      }
    }

    function loadAPConfig() {
      fetch('/api/ap-config?includePassword=true')
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success') {
            if (data.pending) {
              // 显示待确认信息
              document.getElementById('settingsForm').style.display = 'none';
              document.getElementById('pendingInfo').style.display = 'block';
              document.getElementById('newSSID').textContent = data.nextSSID || data.ssid;
              if (data.nextPassword) {
                document.getElementById('newPassword').textContent = '密码: ' + data.nextPassword;
                document.getElementById('wifiQRText').textContent = 'WIFI:T:WPA;S:' + data.nextSSID + ';P:' + data.nextPassword + ';;';
              } else {
                document.getElementById('newPassword').textContent = '开放网络（无密码）';
                document.getElementById('wifiQRText').textContent = 'WIFI:T:nopass;S:' + data.nextSSID + ';;';
              }
              document.getElementById('pendingMessage').textContent = langTexts.pendingMsg[currentLang];
              document.querySelector('#pendingInfo p[style]').textContent = langTexts.pendingHint[currentLang];
            } else {
              // 显示当前配置
              document.getElementById('apSSID').value = data.ssid || '';
              document.getElementById('apPassword').value = data.password || '';
              document.getElementById('currentSSID').textContent = data.ssid + (data.password ? ' (已设置密码)' : ' (开放网络)');
            }
          }
        })
        .catch(error => {
          console.error('加载配置失败:', error);
          showStatus('加载配置失败: ' + error.message, 'error');
        });
    }

    function saveAPConfig() {
      const ssid = document.getElementById('apSSID').value.trim();
      const password = document.getElementById('apPassword').value;

      if (!ssid) {
        showStatus('请输入AP名称', 'error');
        return;
      }

      if (ssid.length > 31) {
        showStatus('AP名称不能超过31个字符', 'error');
        return;
      }

      if (password && password.length > 0 && password.length < 8) {
        showStatus('密码至少需要8个字符', 'error');
        return;
      }

      const config = {
        ssid: ssid,
        password: password
      };

      fetch('/api/ap-config', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(config)
      })
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success') {
            // 显示待确认信息
            document.getElementById('settingsForm').style.display = 'none';
            document.getElementById('pendingInfo').style.display = 'block';
            document.getElementById('newSSID').textContent = data.nextSSID;
            if (data.nextPassword) {
              document.getElementById('newPassword').textContent = '密码: ' + data.nextPassword;
              document.getElementById('wifiQRText').textContent = 'WIFI:T:WPA;S:' + data.nextSSID + ';P:' + data.nextPassword + ';;';
            } else {
              document.getElementById('newPassword').textContent = '开放网络（无密码）';
              document.getElementById('wifiQRText').textContent = 'WIFI:T:nopass;S:' + data.nextSSID + ';;';
            }
            document.getElementById('pendingMessage').textContent = langTexts.pendingMsg[currentLang];
            document.querySelector('#pendingInfo p[style]').textContent = langTexts.pendingHint[currentLang];
          } else {
            showStatus('保存失败: ' + (data.message || '未知错误'), 'error');
          }
        })
        .catch(error => {
          console.error('保存配置失败:', error);
          showStatus('保存配置失败: ' + error.message, 'error');
        });
    }

    function resetAPConfig() {
      if (!confirm(currentLang === 'zh' ? '确定要恢复默认配置吗？设备将重启。' : 'Reset to default? Device will reboot.')) {
        return;
      }

      // 为避免设备重启导致请求挂起，增加超时控制；超时或网络错误均视为已下发重启指令
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3500);

      // 使用 GET 提交复位请求，后端同时支持 GET/POST
      fetch('/api/ap-config/reset', { signal: controller.signal })
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success') {
            showStatus(currentLang === 'zh' ? '已恢复默认配置，设备将重启' : 'Reset to default, device will reboot', 'success');
            setTimeout(() => {
              closeWifiSettings();
            }, 2000);
          } else {
            showStatus('重置失败: ' + (data.message || '未知错误'), 'error');
          }
        })
        .catch(error => {
          // 将网络失败/超时视为设备正在重启，给出正向提示，避免“Failed to fetch”误导
          showStatus(currentLang === 'zh' ? '已恢复默认配置，设备将重启' : 'Reset to default, device will reboot', 'success');
          setTimeout(() => {
            closeWifiSettings();
          }, 2000);
        })
        .finally(() => {
          clearTimeout(timeoutId);
        });
    }

    function showStatus(message, type) {
      const statusEl = document.getElementById('statusMessage');
      statusEl.textContent = message;
      statusEl.className = 'status-message status-' + type;
      statusEl.style.display = 'block';
      setTimeout(() => {
        statusEl.style.display = 'none';
      }, 5000);
    }

    // 点击模态框外部关闭
    window.onclick = function(event) {
      const wifiModal = document.getElementById('settingsModal');
      if (event.target === wifiModal) {
        closeWifiSettings();
      }
      const otherModal = document.getElementById('otherSettingsModal');
      if (event.target === otherModal) {
        closeOtherSettings();
      }
    }

    window.onload = async function() {
      powerUi = createPowerUi({
        mountId: 'powerBadgeMount',
        getLang: () => currentLang,
        alertFn: alert,
        onStateChange: (powerState) => {
          lowBatteryProtectionEnabled = !!powerState.lowBatteryProtectionEnabled;
        }
      });
      powerUi.render();
      initRobotInputWebSocket();
      initSpeedControl();
      initGaitControl();
      // 默认显示中文，无需调用toggleLanguage
      updateModalTexts();
      // 初始化标题栏按钮 title
      const plannerBtn = document.getElementById('plannerBtn');
      if (plannerBtn) {
        plannerBtn.title = '运动规划';
        plannerBtn.setAttribute('aria-label', '运动规划');
      }
      await loadCapsAndUpdateFooter();
      await loadOtherSettings();
      powerUi.startPolling(10000);

      // 绑定“低电量保护”开关
      const lbToggle = document.getElementById('lowBatteryProtectToggle');
      if (lbToggle) {
        lbToggle.checked = !!lowBatteryProtectionEnabled;
        lbToggle.addEventListener('change', () => {
          setLowBatteryProtectionEnabled(!!lbToggle.checked);
        });
      }
      const motionToggle = document.getElementById('motionButtonModeToggle');
      if (motionToggle) {
        motionToggle.checked = motionButtonMode === 'single_cycle';
        motionToggle.addEventListener('change', () => {
          setMotionButtonMode(motionToggle.checked ? 'single_cycle' : 'continuous');
        });
      }
      
      // 检查是否有待确认的配置
      fetch('/api/ap-config')
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success' && data.pending) {
            // 自动确认 pending 配置（用户已在新 AP 下访问页面）
            fetch('/api/ap-config/confirm', { method: 'POST' })
              .then(() => console.log('AP配置已确认'));
          }
        })
        .catch(error => console.error('检查配置状态失败:', error));
    };
  </script>
</body>
</html>
